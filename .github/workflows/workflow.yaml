---
on:
  workflow_call:
    inputs:
      release-enabled:
        type: boolean
        default: true
      lint-enabled:
        type: boolean
        default: true
      runs-on:
        type: string
        default: ubuntu-latest
    outputs:
      released:
        description: "'true' when a new release was published, 'false' otherwise."
        value: ${{ jobs.release.outputs.released }}
      version:
        description: "The new release's semantic version, e.g. '1.8.3'."
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: "The new release's git tag, e.g. 'v1.8.3'."
        value: ${{ jobs.release.outputs.tag }}
      major:
        description: "Major version component, e.g. '1'."
        value: ${{ jobs.release.outputs.major }}
      minor:
        description: "Minor version component, e.g. '8'."
        value: ${{ jobs.release.outputs.minor }}
      patch:
        description: "Patch version component, e.g. '3'."
        value: ${{ jobs.release.outputs.patch }}

name: Commit lint and semantic release

jobs:
  commitlint:
    name: Commit lint
    runs-on: ${{ inputs.runs-on }}
    if: inputs.lint-enabled
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commits
        # v0.3.0: runs as root (fixes .git/objects/ permission denied), supports
        # .semrelrc.yml config, adds release narrative logging.
        # NOTE (known limitation): on pull_request events, semrel lint resolves
        # the commit range as latestAnnotatedTag→HEAD rather than baseRef→HEAD.
        # Ensure all commits since the last release tag conform to conventional
        # commit format before opening a PR.
        uses: nrkno/github-action-sematic-release@4e9e0cd1ef367ecb48ca492f8ad8874584d515ae
        with:
          subcommand: lint
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ${{ inputs.runs-on }}
    if: inputs.release-enabled && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: write
      pull-requests: read
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}
      major: ${{ steps.semrel.outputs.major }}
      minor: ${{ steps.semrel.outputs.minor }}
      patch: ${{ steps.semrel.outputs.patch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Release
        id: semrel
        uses: nrkno/github-action-sematic-release@4e9e0cd1ef367ecb48ca492f8ad8874584d515ae
        with:
          subcommand: release
          token: ${{ secrets.GITHUB_TOKEN }}
